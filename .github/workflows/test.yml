name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    name: pytest (${{ matrix.os }} · py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        # Full history so hatch-vcs can derive a sensible version string.
        # Otherwise dynamic version resolves to a shallow stub.
        with:
          fetch-depth: 0

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: setup python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: sync workspace
        # Plain `uv sync` now installs all members (issue 1 fix: workspace
        # root lists members as deps). --all-packages stays as a belt-and-
        # suspenders so we'd notice if that fix regresses.
        run: uv sync --all-packages

      - name: pytest
        run: uv run pytest -v
        env:
          # Force tests to use a clean state dir, not the runner's home.
          # tests/conftest.py already monkeypatches XDG_STATE_HOME but
          # the env var here covers any code path that bypasses fixture.
          XDG_STATE_HOME: /tmp/khimaira-test-state

      - name: smoke — entry points exist after sync
        # Issue 1 regression guard: `uv sync` must produce every member's
        # console-script in .venv/bin/. If a future change drops khimaira
        # from the workspace deps, this catches it before a user hits
        # "failed to spawn khimaira" mid-bootstrap.
        run: |
          test -x .venv/bin/khimaira || (echo "::error::missing .venv/bin/khimaira"; exit 1)
          test -x .venv/bin/scarlet || (echo "::error::missing .venv/bin/scarlet"; exit 1)
          test -x .venv/bin/seance || (echo "::error::missing .venv/bin/seance"; exit 1)
          test -x .venv/bin/specter || (echo "::error::missing .venv/bin/specter"; exit 1)
          uv run khimaira --version

      - name: smoke — hook modules importable as python -m
        # Issue 3 regression guard: khimaira.hooks.* must be importable
        # AS modules, not just files. install-hooks writes a command of
        # the form `python -m khimaira.hooks.<name>` and Claude Code
        # spawns that — if the package vanishes (e.g. someone reverts
        # the khimaira.hooks/ move), the hooks silently fail.
        run: |
          uv run python -c "import khimaira.hooks.session_start, khimaira.hooks.user_prompt_submit, khimaira.hooks.post_tool_use"

      - name: smoke — install-hooks writes new command form
        # The hook commands settings.json picks up must point at
        # `python -m khimaira.hooks.<name>`, not at a legacy
        # scripts/hooks/*.py path. A regression here means end users
        # who pip install khimaira get hooks pointing at nonexistent
        # files in their site-packages.
        run: |
          out=$(uv run khimaira install-hooks --dry-run)
          echo "$out" | grep -q 'python.*-m khimaira.hooks.session_start' \
            || (echo "::error::install-hooks --dry-run didn't emit python -m form"; echo "$out"; exit 1)
