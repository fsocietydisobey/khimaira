[project]
# Distribution name (PyPI): `khimaira-sibyl` — bare `sibyl` is squatted
# on PyPI. Local package name + import path stay as `sibyl`.
name = "khimaira-sibyl"
version = "0.2.0"
description = "Meeting audio capture + transcription via Gemini — part of the khimaira workspace. Records + transcribes + summarizes + extracts action items + detects emotions via a LangGraph pipeline."
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "fsocietydisobey", email = "f.society.disobey@gmail.com" }
]
requires-python = ">=3.12"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio :: Capture/Recording",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
]
keywords = ["khimaira", "meeting-transcription", "audio-capture", "gemini", "langgraph", "mcp"]
dependencies = [
    # Gemini SDK — the only LLM provider sibyl uses directly (audio
    # capability). Text-only post-processing nodes route through
    # khimaira's pool router and don't pin a provider.
    "google-genai>=1.70",
    "langgraph>=1.1.4",
    # FastMCP — sibyl exposes its tools as a FastMCP server; khimaira
    # re-registers them under its own MCP via sibling-tools loader.
    "mcp>=1.0",
    # Audio capture deps — recorder.py / live.py
    "numpy>=2.4.4",
    "sounddevice>=0.5.5",
    "soundfile>=0.13.1",
    # Workspace siblings — sibyl routes text-only nodes through
    # khimaira's dispatch + records usage to khimaira's tracker.
    # Pinned to v0.1.0+ since sibyl needs the post-Phase-0 unified MCP +
    # usage recorder surface.
    "khimaira>=0.1.0",
    "khimaira-types>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/fsocietydisobey/khimaira"
Repository = "https://github.com/fsocietydisobey/khimaira"
Issues = "https://github.com/fsocietydisobey/khimaira/issues"

[build-system]
# hatchling (not uv_build) — matches the other siblings + lets us keep
# the local module at `src/sibyl/` while the distribution name is
# `khimaira-sibyl`. uv_build infers module path from distribution name
# and would require renaming src/sibyl/ → src/khimaira_sibyl/.
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sibyl"]

[tool.uv.sources]
# Workspace overrides for local dev — uv strips these for the published
# wheel metadata, so the released khimaira-sibyl correctly resolves
# `khimaira>=0.1.0` from PyPI on user install.
khimaira = { workspace = true }
khimaira-types = { workspace = true }
