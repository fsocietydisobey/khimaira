[project]
# Distribution name (PyPI): `khimaira-scarlet` — bare `scarlet` is
# squatted on PyPI. Local package name + import path stay as `scarlet`.
name = "khimaira-scarlet"
version = "0.2.0"
description = "Codebase cartographer MCP server — part of the khimaira workspace. Generates and maintains structural documentation: feature CLAUDE.md files, barrel exports, dependency graphs, symbol manifests."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "fsocietydisobey" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Documentation",
]
keywords = ["khimaira", "codebase-cartography", "tree-sitter", "documentation", "mcp"]
dependencies = [
    "mcp[cli]>=1.0",
    "tree-sitter>=0.21",
    "tree-sitter-python>=0.21",
    "tree-sitter-typescript",
    "tree-sitter-javascript",
    "click",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/fsocietydisobey/khimaira"
Repository = "https://github.com/fsocietydisobey/khimaira"
Issues = "https://github.com/fsocietydisobey/khimaira/issues"

[project.scripts]
# Binary name stays `scarlet` for backward-compat with existing MCP configs.
scarlet = "scarlet.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scarlet"]
