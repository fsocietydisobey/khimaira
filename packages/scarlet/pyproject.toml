[project]
name = "scarlet"
version = "0.1.0.dev0"
description = "Codebase cartography — CLAUDE.md, dep graphs, invariants via tree-sitter"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "fsocietydisobey" }]
dependencies = [
    "tree-sitter>=0.23",
    "pyyaml>=6.0",
]

[project.scripts]
scarlet = "scarlet.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scarlet"]
