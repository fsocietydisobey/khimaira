[project]
name = "khimaira"
# Version is derived from git via hatch-vcs at build time. Each commit
# produces a unique PEP 440 dev version like 0.1.0.dev42+gc22b2db,
# which defeats uv tool install's wheel cache (keyed by name+version)
# and lets dev contributors `uv tool install --force` actually pick up
# new code. Tagged releases produce clean versions (e.g. 0.2.0).
dynamic = ["version"]
description = "Multi-model AI orchestration — patterns, runtime, dispatcher"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "fsocietydisobey" }]
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "langgraph>=0.4",
    "langgraph-checkpoint-sqlite>=2",
    "langchain-core>=0.3",
    "aiosqlite>=0.20",
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "sse-starlette>=2.1",
    "python-dotenv>=1",
    "psutil>=5",
    "anthropic>=0.40",
    "httpx>=0.27",
    "mcp[cli]>=1.0",
    "tree-sitter>=0.21",
    "tree-sitter-python>=0.21",
    # psycopg is needed to read Postgres-backed LangGraph checkpointers
    # (e.g., jeevy_portal). Was an optional extra in earlier migration; that
    # was wrong — monitor's threads endpoint 500s without it for any project
    # using the AsyncPostgresSaver.
    "psycopg[binary]>=3.1",
    # Notebook Phase 2b (self-healing KB retrieval): local embedding + vector
    # search, mirroring mnemosyne's hippocampus pattern. qdrant-client was
    # already present transitively via khimaira-seance; declaring it directly
    # since notebook_pipeline imports it itself now, not just through Séance.
    "qdrant-client>=1.10",
    "fastembed>=0.8.0",
    "khimaira-types",
    "khimaira-transport",
    # khimaira-themis was a workspace member (packages/*) but never a declared
    # dependency of any package — plain `uv sync` (unlike the documented
    # `uv sync --all-packages`) silently uninstalled it, disabling Themis role
    # enforcement daemon-wide for every active session. Declaring it here
    # closes that gap for good, matching how khimaira-chat was integrated.
    "khimaira-themis",
]

[tool.uv.sources]
khimaira-types = { workspace = true }
khimaira-transport = { workspace = true }
khimaira-themis = { workspace = true }

[project.optional-dependencies]
# `pip install khimaira[all]` pulls every sibling on PyPI. Resolves to
# the prefixed distribution names (the bare `seance`/`specter`/`scarlet`/
# `sibyl` names are squatted on PyPI, so siblings ship as `khimaira-*`).
# Local-workspace dev still uses the unprefixed local names via
# [tool.uv.sources] redirects.
all = [
    "khimaira-seance>=0.2.0",
    "khimaira-specter>=0.2.0",
    "khimaira-scarlet>=0.2.0",
    "khimaira-sibyl>=0.2.0",
]

[project.scripts]
khimaira = "khimaira.cli:main"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

# Pull the version from git. Read from the workspace root's git history
# (root-path = "../..") so the version reflects the repo's HEAD across
# all workspace members, not each member's last touch.
[tool.hatch.version]
source = "vcs"
raw-options = { root = "../..", search_parent_directories = true }

# Write the resolved version to khimaira/_version.py at build time so
# khimaira/__init__.py can do `from khimaira._version import __version__`
# without re-running hatch-vcs every import. The file is gitignored.
[tool.hatch.build.hooks.vcs]
version-file = "src/khimaira/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/khimaira"]

# `packages=` traverses src/khimaira and picks up every .py file under
# it — including the observer_template subtree's `khimaira_observer/__init__.py`.
# But hatchling's default file selectors skip non-.py files, so the
# `khimaira_observer.pth` (load-bearing for `khimaira attach` — it's
# what tells Python to import the observer at venv startup) gets
# dropped from the wheel. Force-including just the .pth fills that
# specific gap without needing the v0.1.0-era exclude+full-force-include
# dance that produced duplicate-entry wheels (PyPI rejects those with
# "400 Invalid distribution file. ZIP archive not accepted: Duplicate
# filename in local headers" — verified against TestPyPI 2026-05-14).
[tool.hatch.build.targets.wheel.force-include]
"src/khimaira/attach/observer_template/khimaira_observer.pth" = "khimaira/attach/observer_template/khimaira_observer.pth"
