# Default khimaira profile — applied when no --profile is passed and no
# KHIMAIRA_PROFILE / ~/.config/khimaira/profile.yaml exists.
#
# Minimal: registers khimaira's own MCP server + installs the supervisor.
# No dotfiles, no sibling repos. Devs with their own setup author a
# profile in their dotfiles repo and pass --profile or set KHIMAIRA_PROFILE.

name: khimaira-default
description: |
  Khimaira-only baseline. Installs the khimaira-monitor daemon as a
  host-native supervised service and registers mcp__khimaira__* with
  Claude Code. No personal config, no sibling MCP servers.

# khimaira-monitor needs the SPA built so the web dashboard works.
# Cheap-ish (~4s npm build) and the daemon is supervised so it survives
# a missing build by serving JSON API only — but the dashboard is part
# of the value, so build by default.
spa_build: true

supervisor:
  # Installs systemd user unit (Linux) / launchd LaunchAgent (macOS).
  # No-op on other platforms; khimaira doctor will nudge toward `watch`.
  auto_install: true

mcp_servers:
  - name: khimaira
    # bootstrap.register_mcp wraps the command in `bash -lc` itself —
    # don't pre-wrap or you get a non-functional `bash -lc bash -lc '…'`
    # double-shell that Claude Code's MCP supervisor eventually prunes.
    # The wrapper provides login-shell PATH (so `uv` resolves) and lets
    # the `2>>log` redirect work.
    command: uv --directory ~/dev/khimaira run khimaira mcp 2>>/tmp/khimaira.log

  - name: khimaira-chat
    # Cross-session real-time chat MCP. Spawned as stdio subprocess by
    # Claude Code per session. Talks to khimaira-monitor (HTTP/SSE) for
    # state + fan-out. Channels are research-preview, so peers must
    # launch with `--dangerously-load-development-channels server:khimaira-chat`.
    command: uv --directory ~/dev/khimaira run khimaira-chat 2>>/tmp/khimaira-chat.log

# No repos block: the default assumes khimaira itself is already cloned
# (bootstrap is being run from inside it). Profiles that want sibling
# MCP servers (seance/specter/scarlet/etc.) declare them under `repos`
# AND `mcp_servers` in their own manifest.
