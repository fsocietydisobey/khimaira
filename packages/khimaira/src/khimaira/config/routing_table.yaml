# Privacy mode — when KHIMAIRA_LOCAL_ONLY=1 in env, only these runners may be picked.
local_only_runners: [ollama, llm]

# Classifier configuration — uses the cheap-tier runner. When unavailable, falls
# back to the next-cheapest CLI runner.
classifier:
  preferred_runner: ollama
  preferred_model: llama3.3:70b
  fallback_runner: claude
  fallback_model: claude-haiku-4-5
  timeout_s: 30
