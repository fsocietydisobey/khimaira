# Khimaira-shipped default model registry.
#
# Each entry declares a model khimaira can route to in auto mode. Cost
# rates are public-list-price estimates (input/output USD per million
# tokens) used for the `khimaira usage savings` math — these may drift
# as providers update pricing; khimaira releases periodically refresh.
#
# Capability tags (free-form strings; router matches required ⊆ available):
#   - factual         lookup, definition, "what is", "how do I" questions
#   - code            code reading + generation
#   - reasoning       multi-step, conditional, "if X then Y"
#   - deep-reasoning  cross-cutting architectural, debug-with-context
#   - agentic         tool use, planning, multi-turn
#   - vision          image input support
#   - long-context    >100K context window
#   - fast            sub-2s typical latency for short prompts
#   - cheap           sub-$1/M input
#   - local           runs on the user's machine (no API call)
#   - instruction-follow  strong at "answer EXACTLY in this format"
#
# Users override / extend via ~/.khimaira/models.yaml (or
# $XDG_CONFIG_HOME/khimaira/models.yaml). Same id = full replacement;
# add `enabled_for_auto: false` to exclude from auto without losing
# capability tags (still callable via explicit tier/model arg).

models:
  # -------------------------------------------------------------------
  # Anthropic (Claude) — via the claude CLI / Claude Code subscription
  # -------------------------------------------------------------------
  - id: claude-haiku-4-5
    runner: claude
    capabilities: [factual, fast, cheap, instruction-follow, vision]
    cost_per_1m: { input: 1.00, output: 5.00 }
    subscription: claude-pro
    enabled_for_auto: true

  - id: claude-sonnet-4-6
    runner: claude
    capabilities: [code, reasoning, balanced, vision, agentic, long-context]
    cost_per_1m: { input: 3.00, output: 15.00 }
    subscription: claude-pro
    enabled_for_auto: true

  - id: claude-opus-4-7
    runner: claude
    capabilities: [code, deep-reasoning, agentic, complex-debug, vision, long-context]
    cost_per_1m: { input: 15.00, output: 75.00 }
    subscription: claude-pro
    enabled_for_auto: true

  # -------------------------------------------------------------------
  # Google (Gemini) — via the gemini CLI
  # -------------------------------------------------------------------
  - id: gemini-2.5-flash
    runner: gemini
    capabilities: [factual, fast, cheap, instruction-follow, vision, long-context]
    cost_per_1m: { input: 0.075, output: 0.30 }
    subscription: gemini-cli
    enabled_for_auto: true

  - id: gemini-2.5-pro
    runner: gemini
    capabilities: [code, reasoning, balanced, vision, long-context, agentic]
    cost_per_1m: { input: 1.25, output: 5.00 }
    subscription: gemini-cli
    enabled_for_auto: true

  - id: gemini-2.0-flash
    runner: gemini
    capabilities: [factual, fast, cheap, vision, long-context]
    cost_per_1m: { input: 0.075, output: 0.30 }
    subscription: gemini-cli
    enabled_for_auto: true

  # -------------------------------------------------------------------
  # OpenAI (Codex) — via the codex CLI
  # Disabled by default in auto mode — many users don't have ChatGPT Plus
  # for Codex; opt in by setting `enabled_for_auto: true` in your user
  # registry once you've confirmed `codex --version` works.
  # -------------------------------------------------------------------
  - id: gpt-5
    runner: codex
    capabilities: [code, reasoning, balanced, agentic]
    cost_per_1m: { input: 2.50, output: 10.00 }
    subscription: chatgpt-plus
    enabled_for_auto: false

  # -------------------------------------------------------------------
  # Local (Ollama) — free, runs on user's machine
  # -------------------------------------------------------------------
  - id: llama3.3:70b
    runner: ollama
    capabilities: [local, factual, instruction-follow]
    cost_per_1m: { input: 0.0, output: 0.0 }
    subscription: local
    enabled_for_auto: true

  - id: qwen2.5-coder:32b
    runner: ollama
    capabilities: [local, code, instruction-follow]
    cost_per_1m: { input: 0.0, output: 0.0 }
    subscription: local
    enabled_for_auto: true
