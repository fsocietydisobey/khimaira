[project]
name = "specter"
version = "0.1.0.dev0"
description = "Browser debugging via Chrome DevTools Protocol"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "fsocietydisobey" }]
dependencies = [
    "websockets>=13.0",
    "httpx>=0.27",
]

[project.scripts]
specter = "specter.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/specter"]
