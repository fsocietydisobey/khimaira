# Themis rules — jp-backend-lead role
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
role: jp-backend-lead
invariants:
  - id: IN-JP-BACKEND-LEAD-1
    name: NO_FILE_EDIT_OUTSIDE_BACKEND
    severity: block
    matchers:
      - tool: Edit
        tool_input_field:
          field: file_path
          pattern: '^(?!.*(?:backend/api/|backend/core/agents/|backend/core/services/|backend/core/models/|backend/core/domain/|backend/workers/|backend/strategies/|backend/evals/|backend/tests/|/home/_3ntropy/dev/khimaira/packages/khimaira/src/khimaira/roles/jp\-backend\-lead\.md|/home/_3ntropy/dev/khimaira/docs/domain/backend\-knowledge\.md)).+'
      - tool: Write
        tool_input_field:
          field: file_path
          pattern: '^(?!.*(?:backend/api/|backend/core/agents/|backend/core/services/|backend/core/models/|backend/core/domain/|backend/workers/|backend/strategies/|backend/evals/|backend/tests/|/home/_3ntropy/dev/khimaira/packages/khimaira/src/khimaira/roles/jp\-backend\-lead\.md|/home/_3ntropy/dev/khimaira/docs/domain/backend\-knowledge\.md)).+'
    message: |
      🛑 Themis IN-JP-BACKEND-LEAD-1 (NO_FILE_EDIT_OUTSIDE_BACKEND): jp-backend-lead
      attempted to edit a file outside the backend domain. Edits restricted to
      the paths listed in the jp-backend-lead role doc's Domain scope section.
      Cross-domain work: flag to master, who defines the contract. Direct
      cross-domain edits violate the domain-lead boundary.

  - id: IN-JP-BACKEND-LEAD-2
    name: NO_STANDALONE_AGENTS
    severity: block
    matchers:
      - tool: Task
    message: |
      🛑 Themis IN-JP-BACKEND-LEAD-2 (NO_STANDALONE_AGENTS): jp-backend-lead spawned
      a standalone Task agent. Use chat_task_create + chat_send_to for fan-out
      to roster transient agents. Standalone Task agents bypass the enforcement
      gate + observer lifecycle.

  - id: IN-JP-BACKEND-LEAD-3
    name: PATH_CONTENTION
    severity: warn
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    conditions:
      - check: path_touched_by_other_live_session
    message: |
      ⚠️ Themis IN-JP-BACKEND-LEAD-3 (PATH_CONTENTION): another live session recently
      touched the same file you are about to edit — concurrent {tool_name} risks
      silent clobber/lost writes. Coordinate via roster chat or use isolation:worktree.
      (Guard-2 — #54 working-tree-lock)

  - id: IN-JP-BACKEND-LEAD-1-PO
    name: NO_FILE_EDIT_PROPOSE_ONLY
    severity: block
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    message: |
      🛑 Themis IN-JP-BACKEND-LEAD-1-PO (NO_FILE_EDIT_PROPOSE_ONLY): jp-backend-lead is in
      PROPOSE-ONLY mode for jeevy. Audit, analyze, propose, and
      review only — no writes without explicit Joseph authorization via
      intake/master. To implement, propose your plan to master; master
      dispatches to an authorized agent or grants explicit write permission.
