# Themis rules — agent role
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
role: agent
invariants:
  - id: IN-AGENT-1
    name: LOAD_DOTENV_OVERRIDE
    severity: block
    matchers:
      - tool: Edit
        tool_input_field:
          field: new_string
          pattern: "os\\.getenv\\([\"'](?:ANTHROPIC|OPENAI|AZURE|GOOGLE|GEMINI)_"
      - tool: Write
        tool_input_field:
          field: content
          pattern: "os\\.getenv\\([\"'](?:ANTHROPIC|OPENAI|AZURE|GOOGLE|GEMINI)_"
    message: |
      🛑 Themis IN-AGENT-1 (LOAD_DOTENV_OVERRIDE): {tool_name} writes bare os.getenv()
      on an API key without load_dotenv(override=True). This silently inherits shell
      credentials instead of reading the project .env. Pattern: call
      load_dotenv(override=True) before any os.getenv() on API keys.
      See security rule: ~/.claude/rules/engineering/security.md.

  - id: IN-AGENT-2
    name: NO_NO_VERIFY
    severity: block
    matchers:
      - tool: Bash
        tool_input_field:
          field: command
          pattern: "--no-verify\\b"
    message: |
      🛑 Themis IN-AGENT-2 (NO_NO_VERIFY): Bash command contains --no-verify.
      Pre-commit hooks exist for a reason — bypassing them is how bugs slip into
      main. Fix the hook failure instead of routing around it.

  - id: IN-AGENT-3
    name: NO_API_DISPATCH
    severity: block
    matchers:
      - tool: mcp__khimaira__auto
      - tool: mcp__khimaira__delegate
      - tool: mcp__khimaira__research
    message: |
      🛑 Themis IN-AGENT-3 (NO_API_DISPATCH): {tool_name} spawns a standalone API
      call outside the roster model. Agents implement; they do not orchestrate.
      If you need research, ask master to assign a research sub-task.

  - id: IN-AGENT-4
    name: DONE_REPORT_BRANCH_DECLARATION
    severity: warn
    matchers:
      - tool: mcp__khimaira-chat__chat_task_update
    conditions:
      - check: done_report_missing_branch_declaration
    message: |
      ⚠️ Themis IN-AGENT-4 (DONE_REPORT_BRANCH_DECLARATION): chat_task_update
      with status=done is missing one or more required git-state declarations.
      Required fields (per agent.md done-report template, 2026-05-26):
        branch: <branch name>
        worktree: <path or "none">
        merge_intent: <merge-to-main | keep-isolated | drop | defer-to-arc-<id>>
      Without these, master can't audit arc-end coherence (Step 7 — Reconcile)
      and silent worktree strands recur (JEEVY-543 failure mode).
      Severity is warn permanently (heuristic nudge; legitimate edge cases
      may omit, e.g. trivial single-task ack — master verifies at Step 7).

  - id: IN-AGENT-5
    name: PATH_CONTENTION
    severity: warn
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    conditions:
      - check: path_touched_by_other_live_session
    message: |
      ⚠️ Themis IN-AGENT-5 (PATH_CONTENTION): another live session recently
      touched the same file you are about to edit — concurrent {tool_name} risks
      silent clobber/lost writes.
      Coordinate via the roster chat before editing, or use isolation:worktree
      for hard file-level isolation.
      KNOWN LIMITATION: sub-second simultaneous edits both pass (TOCTOU);
      hard exclusion requires isolation:worktree.
      (Guard-2 — #54 working-tree-lock)

  - id: IN-AGENT-6
    name: GATE_BEFORE_COMMIT
    severity: block
    matchers:
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\bgit\s+commit\b'
    conditions:
      - check: gate_verdicts_incomplete
    message: |
      🛑 Themis IN-AGENT-6 (GATE_BEFORE_COMMIT): git commit blocked — the active
      task lacks critic APPROVE + verifier SHIP structured gate verdicts.

      Get both verdicts via chat_task_verdict(task_id, verdict) before committing:
        critic → verdict="approve" or "changes"
        verifier → verdict="ship" or "hold"

      If critic/verifier is genuinely down and the daemon is unreachable, that is
      a hard escalation to Joseph + roster — NOT a bypass. The gate exists to
      prevent exactly the "inline review because reviewer is unreachable" pattern
      that committed broken code in #66 (6a4ebf2) and #58 today.

      No active task (ad-hoc commit)? → allowed without verdicts.
      Daemon unreachable? → hook fail-opens at the network layer (D7 / #61 axis-A).
