# Themis rules — observer role
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
role: observer
invariants:
  - id: IN-OBSERVER-1
    name: READ_ONLY
    severity: block
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    message: |
      🛑 Themis IN-OBSERVER-1 (READ_ONLY): observer cannot call {tool_name}.
      Observer is read-only: it monitors, logs, and surfaces anomalies to master
      but never modifies files. Hand edit tasks to an agent via master.

  - id: IN-OBSERVER-2
    name: NO_TASK_ASSIGNMENT
    severity: block
    matchers:
      - tool: mcp__khimaira-chat__chat_task_create
    message: |
      🛑 Themis IN-OBSERVER-2 (NO_TASK_ASSIGNMENT): observer cannot create tasks.
      Only master assigns work. If you observe a violation or blocker, surface it
      via session_post_notice to master — do not self-dispatch remediation.

  - id: IN-OBSERVER-3
    name: NO_BASH_MUTATING
    severity: block
    matchers:
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\bgit\s+(commit|push|merge|rebase|reset|checkout\s+-|stash\s+pop|tag\s+-)'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\b(rm|mv|cp|mkdir|touch|chmod|chown)\s+'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '>\s*[^/]'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '>>\s*[^/]'
    message: |
      🛑 Themis IN-OBSERVER-3 (NO_BASH_MUTATING): observer is read-only.
      Mutating Bash is a role-boundary violation. Surface findings via chat,
      do not act on them.

  - id: IN-OBSERVER-4
    name: NO_STANDALONE_AGENTS
    severity: block
    matchers:
      - tool: Task
    message: |
      🛑 Themis IN-OBSERVER-4 (NO_STANDALONE_AGENTS): observer does not spawn
      sub-agents. Surface findings to master via chat_send; let master dispatch.
