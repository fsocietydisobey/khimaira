# Themis rules — gatekeeper role (critic + verifier merged, lean roster)
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
#
# Gatekeeper = the lean roster's commit gate (merges the retired critic +
# verifier). It authors the single ship/hold gate verdict whose reasoning covers
# BOTH axes — critique/correctness AND verification/tests. Like the verifier it
# MAY edit TEST files only (run + fix failing tests); production edits go to an
# agent. It does not mutate git state or spawn sub-agents.
role: gatekeeper
invariants:
  - id: IN-GATEKEEPER-1
    name: NO_NONTEST_FILE_EDIT
    severity: block
    matchers:
      - tool: Edit
        tool_input_field:
          field: file_path
          # Block edits to any path that is NOT a test path (mirrors IN-VERIFIER-1).
          pattern: '^(?!.*(?:test_|_test\.|/tests?/|conftest|\.spec\.|\.test\.)).*'
      - tool: Write
        tool_input_field:
          field: file_path
          pattern: '^(?!.*(?:test_|_test\.|/tests?/|conftest|\.spec\.|\.test\.)).*'
      - tool: MultiEdit
        tool_input_field:
          field: file_path
          pattern: '^(?!.*(?:test_|_test\.|/tests?/|conftest|\.spec\.|\.test\.)).*'
      - tool: NotebookEdit
        tool_input_field:
          field: file_path
          pattern: '^(?!.*(?:test_|_test\.|/tests?/|conftest|\.spec\.|\.test\.)).*'
    message: |
      🛑 Themis IN-GATEKEEPER-1 (NO_NONTEST_FILE_EDIT): gatekeeper may only edit
      test files (test_*, *_test, /tests/, conftest, *.spec, *.test). This
      production path is off-limits — gatekeeper's job is the SHIP/HOLD gate verdict
      (covering correctness + verification) and fixing failing tests, not changing
      source. Production edits go to an agent.

  - id: IN-GATEKEEPER-2
    name: NO_BASH_MUTATING
    severity: block
    matchers:
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\bgit\s+(commit|push|merge|rebase|reset|checkout\s+-|stash\s+pop|tag\s+-)'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\b(rm|mv|cp|mkdir|touch|chmod|chown)\s+'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '>\s*[^/&]'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '>>\s*[^/&]'
    message: |
      🛑 Themis IN-GATEKEEPER-2 (NO_BASH_MUTATING): gatekeeper cannot commit, push,
      or run destructive Bash ops. Its verdict is SHIP | HOLD — committing belongs
      to the agent that implemented the change. Package-manager ops (npm/pip install)
      are allowed; git-state mutations are not.

  - id: IN-GATEKEEPER-3
    name: NO_STANDALONE_AGENTS
    severity: block
    matchers:
      - tool: Task
    message: |
      🛑 Themis IN-GATEKEEPER-3 (NO_STANDALONE_AGENTS): gatekeeper does not spawn
      sub-agents. Return your verdict via chat_task_verdict; let master dispatch.
