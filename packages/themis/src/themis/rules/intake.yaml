# Themis rules — intake role
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
role: intake
invariants:
  - id: IN-INTAKE-1
    name: NO_FILE_EDIT
    severity: block
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    message: |
      🛑 Themis IN-INTAKE-1 (NO_FILE_EDIT): intake cannot call {tool_name}.
      Hand off to an agent via /khimaira-assign <agent> "<task spec>" instead.
      The boundary exists so intake's status answers stay current — the
      moment intake implements, its "what's the status?" answer drifts.

  - id: IN-INTAKE-2
    name: NO_API_DISPATCH
    severity: block
    matchers:
      - tool: mcp__khimaira__auto
      - tool: mcp__khimaira__delegate
      - tool: mcp__khimaira__research
    message: |
      🛑 Themis IN-INTAKE-2 (NO_API_DISPATCH): {tool_name} hits the Anthropic API
      and duplicates the roster's dispatch layer. Use /khimaira-assign instead.

  - id: IN-INTAKE-3
    name: NO_STANDALONE_AGENTS
    severity: block
    matchers:
      - tool: Task
    message: |
      🛑 Themis IN-INTAKE-3 (NO_STANDALONE_AGENTS): cannot spawn worktree or
      background Claude Code agents. Check session_list() — if agents are idle,
      use /khimaira-assign. Standalone agents bypass the enforcement gate,
      context broadcast, observer, and task lifecycle.

  - id: IN-INTAKE-4
    name: NO_BASH_MUTATING
    severity: block
    matchers:
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\bgit\s+(commit|push|merge|rebase|reset|checkout\s+-|stash\s+pop|tag\s+-)'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\b(rm|mv|cp|mkdir|touch|chmod|chown)\s+'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '>\s*[^/]'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '>>\s*[^/]'
    message: |
      🛑 Themis IN-INTAKE-4 (NO_BASH_MUTATING): this Bash command mutates state
      (git commit/push, rm/mv/cp/mkdir, or shell output redirect outside /tmp).
      Intake is a non-executor role — read-only Bash (wc, find, grep, ls) is
      allowed; mutating operations are not. Hand off by relaying to master
      (notice/chat); master dispatches.

  - id: IN-INTAKE-5
    name: NO_MASTER_DISPATCH
    severity: warn
    matchers:
      - tool: mcp__khimaira-chat__chat_task_create
      - tool: mcp__khimaira-chat__chat_task_signal_start
    message: |
      ⚠️  Themis IN-INTAKE-5 (NO_MASTER_DISPATCH): intake called {tool_name},
      which is master's exclusive dispatch primitive. Intake owns context
      packaging and handoff; master owns BEGIN-gate and task lifecycle.
      Correct path: post a HANDOFF or notice to master (chat_send / session_post_notice),
      then let master call chat_task_create + chat_task_signal_start.
      Observed twice (2026-05-25 + 2026-05-26 — intake-skip-master-mediation class).
