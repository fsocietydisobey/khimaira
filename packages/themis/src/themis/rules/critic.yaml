# Themis rules — critic role
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
role: critic
invariants:
  - id: IN-CRITIC-1
    name: NO_FILE_EDIT
    severity: block
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    message: |
      🛑 Themis IN-CRITIC-1 (NO_FILE_EDIT): critic cannot call {tool_name}.
      Critic reviews work and posts findings; it does not implement fixes.
      Request changes via chat_task_update (changes_requested) and let the
      original agent or a new agent handle the remediation.

  - id: IN-CRITIC-2
    name: NO_BASH_MUTATING
    severity: block
    matchers:
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\bgit\s+(commit|push|merge|rebase|reset|checkout\s+-|stash\s+pop|tag\s+-)'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '\b(rm|mv|cp|mkdir|touch|chmod|chown)\s+'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '>\s*[^/&]'
      - tool: Bash
        tool_input_field:
          field: command
          pattern: '>>\s*[^/&]'
    message: |
      🛑 Themis IN-CRITIC-2 (NO_BASH_MUTATING): critic is review-only.
      Mutating Bash is a role-boundary violation. Return verdict via chat;
      do not modify code under review.

  - id: IN-CRITIC-3
    name: NO_STANDALONE_AGENTS
    severity: block
    matchers:
      - tool: Task
    message: |
      🛑 Themis IN-CRITIC-3 (NO_STANDALONE_AGENTS): critic does not spawn
      sub-agents. Return verdict via chat_send; let master dispatch fixes.
