# Themis rules — jp-data-lead role
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
# Inherits: IN-DATA-LEAD-BASE-1 (NO_DIRECT_CODING, locked) +
#            IN-DATA-LEAD-BASE-2 (NO_GIT_COMMIT, locked)
role: jp-data-lead
extends: data-lead.base
invariants:
  - id: IN-JP-DATA-LEAD-2
    name: NO_STANDALONE_AGENTS
    severity: block
    matchers:
      - tool: Task
    message: |
      🛑 Themis IN-JP-DATA-LEAD-2 (NO_STANDALONE_AGENTS): jp-data-lead spawned
      a standalone Task agent. Use chat_task_create + chat_send_to for fan-out
      to roster transient agents. Standalone Task agents bypass the enforcement
      gate + observer lifecycle.

  - id: IN-JP-DATA-LEAD-3
    name: PATH_CONTENTION
    severity: warn
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    conditions:
      - check: path_touched_by_other_live_session
    message: |
      ⚠️ Themis IN-JP-DATA-LEAD-3 (PATH_CONTENTION): another live session recently
      touched the same file you are about to edit — concurrent {tool_name} risks
      silent clobber/lost writes. Coordinate via roster chat or use isolation:worktree.
      (Guard-2 — #54 working-tree-lock)

  - id: IN-JP-DATA-LEAD-1-PO
    name: NO_FILE_EDIT_PROPOSE_ONLY
    severity: block
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    message: |
      🛑 Themis IN-JP-DATA-LEAD-1-PO (NO_FILE_EDIT_PROPOSE_ONLY): jp-data-lead is in
      PROPOSE-ONLY mode for jeevy. Audit, analyze, propose, and
      review only — no writes without explicit Joseph authorization via
      intake/master. To implement, propose your plan to master; master
      dispatches to an authorized agent or grants explicit write permission.
