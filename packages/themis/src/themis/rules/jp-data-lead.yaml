# Themis rules — jp-data-lead role
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
role: jp-data-lead
invariants:
  - id: IN-JP-DATA-LEAD-1
    name: NO_FILE_EDIT_OUTSIDE_DATA
    severity: block
    matchers:
      - tool: Edit
        tool_input_field:
          field: file_path
          pattern: "^(?!.*(?:supabase/migrations/|supabase/seed\.sql|backend/schemas/|backend/core/services/database/|backend/fixtures/|/home/_3ntropy/dev/khimaira/packages/khimaira/src/khimaira/roles/jp\-data\-lead\.md|/home/_3ntropy/dev/khimaira/docs/domain/data\-knowledge\.md)).+"
      - tool: Write
        tool_input_field:
          field: file_path
          pattern: "^(?!.*(?:supabase/migrations/|supabase/seed\.sql|backend/schemas/|backend/core/services/database/|backend/fixtures/|/home/_3ntropy/dev/khimaira/packages/khimaira/src/khimaira/roles/jp\-data\-lead\.md|/home/_3ntropy/dev/khimaira/docs/domain/data\-knowledge\.md)).+"
    message: |
      🛑 Themis IN-JP-DATA-LEAD-1 (NO_FILE_EDIT_OUTSIDE_DATA): jp-data-lead
      attempted to edit a file outside the data domain. Edits restricted to
      the paths listed in the jp-data-lead role doc's Domain scope section.
      Cross-domain work: flag to master, who defines the contract. Direct
      cross-domain edits violate the domain-lead boundary.

  - id: IN-JP-DATA-LEAD-2
    name: NO_STANDALONE_AGENTS
    severity: block
    matchers:
      - tool: Task
    message: |
      🛑 Themis IN-JP-DATA-LEAD-2 (NO_STANDALONE_AGENTS): jp-data-lead spawned
      a standalone Task agent. Use chat_task_create + chat_send_to for fan-out
      to roster transient agents. Standalone Task agents bypass the enforcement
      gate + observer lifecycle.

  - id: IN-JP-DATA-LEAD-1-PO
    name: NO_FILE_EDIT_PROPOSE_ONLY
    severity: block
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    message: |
      🛑 Themis IN-JP-DATA-LEAD-1-PO (NO_FILE_EDIT_PROPOSE_ONLY): jp-data-lead is in
      PROPOSE-ONLY mode for jeevy. Audit, analyze, propose, and
      review only — no writes without explicit Joseph authorization via
      intake/master. To implement, propose your plan to master; master
      dispatches to an authorized agent or grants explicit write permission.
