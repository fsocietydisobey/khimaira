# Themis rules — frontend-lead role
# Khimaira's own frontend-lead (not jeevy-specific).
# Inherits: IN-FRONTEND-LEAD-BASE-1 (NO_DIRECT_CODING, locked) +
#            IN-FRONTEND-LEAD-BASE-2 (NO_GIT_COMMIT, locked)
role: frontend-lead
extends: frontend-lead.base
invariants:
  - id: IN-FRONTEND-LEAD-1
    name: PATH_CONTENTION
    severity: warn
    matchers:
      - tool: Edit
      - tool: Write
      - tool: MultiEdit
      - tool: NotebookEdit
    conditions:
      - check: path_touched_by_other_live_session
    message: |
      ⚠️ Themis IN-FRONTEND-LEAD-1 (PATH_CONTENTION): another live session recently
      touched the same file you are about to edit — concurrent {tool_name} risks
      silent clobber/lost writes. Coordinate via roster chat or use isolation:worktree.
      (Guard-2 — #54 working-tree-lock)
