# Themis rules — data-lead role
role: data-lead
invariants:
  - id: IN-DATA-LEAD-1
    name: NO_FILE_EDIT_OUTSIDE_DATA
    severity: block
    matchers:
      - tool: Edit
        tool_input_field:
          field: file_path
          pattern: "^(?!.*(?:packages/khimaira/src/khimaira/monitor/(?:sessions\\.py|chats\\.py|discovery/)|packages/khimaira/src/khimaira/roles/data-lead\\.md|packages/khimaira/tests/test_(?:sessions|chats|schema)_|docs/domain/data-knowledge\\.md)).+"
      - tool: Write
        tool_input_field:
          field: file_path
          pattern: "^(?!.*(?:packages/khimaira/src/khimaira/monitor/(?:sessions\\.py|chats\\.py|discovery/)|packages/khimaira/src/khimaira/roles/data-lead\\.md|packages/khimaira/tests/test_(?:sessions|chats|schema)_|docs/domain/data-knowledge\\.md)).+"
    message: |
      🛑 Themis IN-DATA-LEAD-1 (NO_FILE_EDIT_OUTSIDE_DATA): data-lead attempted
      to edit a file outside the data domain. Edits restricted to:
        packages/khimaira/src/khimaira/monitor/{sessions.py,chats.py,discovery/}
        packages/khimaira/src/khimaira/roles/data-lead.md
        packages/khimaira/tests/test_sessions_* + test_chats_* + test_schema_*
        docs/domain/data-knowledge.md
      Cross-domain work (especially shared sessions.py / chats.py with
      backend-lead): flag to master, who defines the contract.

  - id: IN-DATA-LEAD-2
    name: NO_STANDALONE_AGENTS
    severity: block
    matchers:
      - tool: Task
    message: |
      🛑 Themis IN-DATA-LEAD-2 (NO_STANDALONE_AGENTS): data-lead spawned a
      standalone Task agent. Use chat_task_create for roster transient agents.
