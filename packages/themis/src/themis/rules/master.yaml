# Themis rules — master role
# Conditions are AND-combined only. No OR/NOT support in Phase 1.
role: master
invariants:
  - id: IN-MASTER-1
    name: CHAT_MY_CHATS_FRESH
    severity: block
    matchers:
      - tool: mcp__khimaira-chat__chat_send
      - tool: mcp__khimaira-chat__chat_send_to
      - tool: mcp__khimaira-chat__chat_history
      - tool: mcp__khimaira-chat__chat_invite
    conditions:
      - check: chat_my_chats_not_called_this_turn
    message: |
      🛑 Themis IN-MASTER-1 (CHAT_MY_CHATS_FRESH): {tool_name} called without a
      fresh chat_my_chats registration this turn. Call chat_my_chats(session_id=...)
      first — without it, incoming messages are not delivered in real time.
      Root cause of 2026-05-19 and 2026-05-21 incidents.

  - id: IN-MASTER-2
    name: NO_API_DISPATCH
    severity: block
    matchers:
      - tool: mcp__khimaira__auto
      - tool: mcp__khimaira__delegate
      - tool: mcp__khimaira__research
    message: |
      🛑 Themis IN-MASTER-2 (NO_API_DISPATCH): {tool_name} bypasses the roster
      dispatch model. Use chat_task_create + chat_send_to to assign work to
      roster agents instead of spawning a standalone API call.

  - id: IN-MASTER-3
    name: NO_STANDALONE_AGENTS_WHEN_IDLE
    severity: block
    matchers:
      - tool: Task
    conditions:
      - check: idle_agents_exist
    message: |
      🛑 Themis IN-MASTER-3 (NO_STANDALONE_AGENTS_WHEN_IDLE): cannot spawn a Task
      agent while roster agents are idle. Assign work via /khimaira-assign or
      chat_task_create to keep the enforcement gate, observer, and lifecycle intact.

  - id: IN-MASTER-4
    name: CONSULT_BEFORE_USER
    severity: warn
    matchers:
      - tool: AskUserQuestion
    conditions:
      - check: no_recent_top_tier_consult
    message: |
      ⚠️ Themis IN-MASTER-4 (CONSULT_BEFORE_USER): AskUserQuestion called with no
      recent top-tier consult in the prior tool calls.
      If this is a design/architecture/trade-off question, consult the relevant
      top-tier agent first via /khimaira-consult:
        design → architect-1, scope → analyst-1, correctness → critic-1, coverage → verifier-1
      If this is a user-preference question (which feature ships, which UI option, etc.)
      no consult is needed — proceed.
      Severity is warn (observation week 2026-05-22 → 2026-05-29); will flip to block.

  - id: IN-MASTER-5
    name: PARALLELIZE_INDEPENDENT_WORK
    severity: warn
    matchers:
      - tool: mcp__khimaira-chat__chat_task_create
      - tool: mcp__khimaira-chat__chat_send_to
    conditions:
      - check: idle_capacity_available
      - check: no_recent_parallel_dispatch
    message: |
      ⚠️ Themis IN-MASTER-5 (PARALLELIZE_INDEPENDENT_WORK): dispatching serially
      with idle roster capacity available.
      Before proceeding, audit:
        1. session_list() — how many idle agents are in this roster?
        2. Is the next work composable into N independent slices?
           (different files, different layers, no causal dependency)
      If yes to both: send multiple chat_task_create calls in a single message
      (parallel tool uses) instead of sequencing them.
      If genuinely sequential (causal dependency), proceed — this warn is advisory.
      Severity is warn (observation week 2026-05-22 → 2026-05-29); will flip to block.
