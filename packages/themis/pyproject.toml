[project]
name = "khimaira-themis"
version = "0.1.0"
description = "Themis — role-invariant enforcement service for the khimaira workspace. Defines per-role rules in YAML and evaluates them against tool calls."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "fsocietydisobey" }]
keywords = ["khimaira", "enforcement", "role-boundaries", "pretooluse", "mcp"]
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
server = ["mcp[cli]>=1.0"]

[project.scripts]
themis = "themis.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/themis"]
artifacts = [
    "src/themis/rules/*.yaml",
    "src/themis/assets/**/*.md",
]
