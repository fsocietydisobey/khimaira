[project]
name = "seance"
version = "0.1.0.dev0"
description = "Semantic code search via vector embeddings"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "fsocietydisobey" }]
dependencies = [
    "sentence-transformers>=3.0",
    "lancedb>=0.13",
    "pyyaml>=6.0",
]

[project.scripts]
seance = "seance.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/seance"]
