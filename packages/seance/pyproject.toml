[project]
name = "seance"
version = "0.1.0.dev0"
description = "Semantic codebase search MCP server. Indexes code into vector embeddings for natural language retrieval."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "fsocietydisobey" }]
dependencies = [
    "mcp[cli]>=1.0",
    "google-genai",
    "tree-sitter>=0.21",
    "tree-sitter-python>=0.21",
    "tree-sitter-typescript",
    "tree-sitter-javascript",
    "click",
    "qdrant-client>=1.17.1",
]

[project.scripts]
seance = "seance.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/seance"]
